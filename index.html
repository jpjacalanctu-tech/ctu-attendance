<!DOCTYPE html>
<html>
<head>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(90deg,#3b6fd8,#1c4fb8);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
display:flex;
width:1000px;
height:450px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.left-panel{
background:#0d3a86;
color:white;
width:45%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
border-top-right-radius:200px;
border-bottom-right-radius:200px;
}

.logo{
width:90px;
margin-bottom:10px;
}

.school{
font-size:14px;
text-align:center;
margin-bottom:30px;
}

.clock{
font-size:50px;
font-weight:bold;
}

.date{
font-size:18px;
margin-top:10px;
}

.right-panel{
width:55%;
padding:40px;
text-align:center;
}

.right-panel h2{
font-weight:500;
margin-bottom:30px;
}

.section{
margin-bottom:25px;
}

button{
width:120px;
padding:12px;
margin:5px;
border:none;
border-radius:6px;
background:#e0e0e0;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#cfcfcf;
}

</style>

</head>

<body>

<div class="container">

<div class="left-panel">

<img src="https://upload.wikimedia.org/wikipedia/commons/9/9a/CTU_new_logo.png" class="logo">

<div class="school">
CEBU TECHNOLOGICAL UNIVERSITY – DUMANJUG CAMPUS
</div>

<div class="clock" id="clock">00:00:00</div>

<div class="date" id="date"></div>

</div>


<div class="right-panel">

<h2>Please Scan Your Finger</h2>

<input id="facultyID" placeholder="Enter Faculty ID Number" 
style="padding:8px;width:220px;margin-bottom:10px;font-size:16px;"
onkeyup="showFacultyName()">

<div id="facultyName" style="font-size:16px;color:green;margin-bottom:20px;">
</div>

<div class="section">
    <div class="section">
        Morning<br>
        
        <button onclick="log('Morning','IN')">IN</button>
        <span id="MorningIN" style="margin-right:10px;"></span>
        
        <button onclick="log('Morning','OUT')">OUT</button>
        <span id="MorningOUT"></span>
        
        </div>

<div class="section">
    Afternoon<br>

    <button onclick="log('Afternoon','IN')">IN</button>
    <span id="AfternoonIN" style="margin-right:10px;"></span>
    
    <button onclick="log('Afternoon','OUT')">OUT</button>
    <span id="AfternoonOUT"></span>
    
    </div>

<div class="section">
    Overtime<br>

    <button onclick="log('Overtime','IN')">IN</button>
    <span id="OvertimeIN" style="margin-right:10px;"></span>
    
    <button onclick="log('Overtime','OUT')">OUT</button>
    <span id="OvertimeOUT"></span>
    
    </div>

</div>

</div>

<script>

    /* CLOCK SYSTEM */
    
    function updateClock() {
    
    const now = new Date();
    
    const time = now.toLocaleTimeString('en-US', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
    });
    
    const date = now.toLocaleDateString('en-US', {
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
    });
    
    document.getElementById("clock").textContent = time;
    document.getElementById("date").textContent = date;
    
    }
    
    /* Start clock when page loads */
    
    window.onload = function(){
    updateClock();
    setInterval(updateClock,1000);
    };
    
    
    /* LOGGING FUNCTION */
    
    function log(session, action){
    
    var facultyID=document.getElementById("facultyID").value;
    
    if(facultyID==""){
    alert("Please enter your Faculty ID.");
    return;
    }
    
    var key=session+action;
    var today=new Date().toDateString();
    var savedDate=localStorage.getItem("logDate");
    
    /* DAILY RESET */
    
    if(savedDate!=today){
    localStorage.clear();
    localStorage.setItem("logDate",today);
    }
    
    /* PREVENT DOUBLE LOGGING */
    
    if(localStorage.getItem(key)){
    alert("You already logged "+action+" for "+session);
    return;
    }
    
    /* CURRENT TIME */
    
    var now=new Date();
    var time=now.toLocaleTimeString();
    
    /* SHOW ON SCREEN */
    
    document.getElementById(session+action).innerHTML=time;
    
    /* SAVE LOCAL */
    
    localStorage.setItem(key,time);
    
    /* SEND TO GOOGLE SHEETS */
    
    fetch("https://script.google.com/macros/s/AKfycbx2Sjb4_N2B88hO55KWkuyGF55wgux3XCYgQRnAtUrWQ-_f9ChrCOrUbeeE19eB5ZqfMg/exec",{
    
    method:"POST",
    
    body:JSON.stringify({
    facultyID:facultyID,
    session:session,
    action:action,
    time:time
    })
    
    });
    
    alert("Successfully logged "+action+" for "+session);
    
    }
    
    </script>

</body>
</html>
